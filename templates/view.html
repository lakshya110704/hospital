<!DOCTYPE html>
<html>
<head>
    <title>Patients List</title>
</head>
<body>

<h1>Patients</h1>

<table border="1">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Age</th>
    <th>Action</th>
</tr>

{% for p in patients %}
<tr>
    <td>{{ p[0] }}</td>
    <td>{{ p[1] }}</td>
    <td>{{ p[2] }}</td>
    <td>
        <a href="/delete/{{ p[0] }}">Delete</a>
    </td>
</tr>
{% endfor %}

</table>

<br>
<a href="/">Add Patient</a>

</body>
</html>
